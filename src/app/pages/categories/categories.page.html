<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title class="page-title">Categories</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openNew()" fill="clear" color="primary">
        <ion-icon name="add" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ng-container *ngIf="categoriesWithCount$ | async as categories">

    <!-- Empty state -->
    <div class="empty-state" *ngIf="categories.length === 0">
      <ion-icon name="pricetag-outline"></ion-icon>
      <h3>No categories yet</h3>
      <p>Create categories to organise your tasks</p>
      <ion-button (click)="openNew()" fill="outline" color="primary" class="create-btn">
        <ion-icon name="add" slot="start"></ion-icon>
        Create Category
      </ion-button>
    </div>

    <!-- Category grid -->
    <div class="categories-grid" *ngIf="categories.length > 0">
      <ion-item-sliding #slidingItem *ngFor="let cat of categories; trackBy: trackByCategoryId"
        class="animate-slide-up">

        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="deleteCategory(cat, slidingItem)" expandable>
            <ion-icon name="trash" slot="icon-only"></ion-icon>
          </ion-item-option>
        </ion-item-options>

        <ion-item #sliding class="category-card" lines="none" (click)="openEdit(cat, slidingItem)">
          <!-- Color stripe -->
          <div class="color-stripe" [style.background]="cat.color" slot="start">
            <ion-icon [name]="cat.icon" [style.color]="cat.color"></ion-icon>
          </div>

          <ion-label>
            <h2 class="cat-name">{{ cat.name }}</h2>
            <div class="cat-stats">
              <span>{{ cat.taskCount }} tasks</span>
              <span class="dot">·</span>
              <span class="completed-count">{{ cat.completedCount }} done</span>
            </div>

            <!-- Progress bar -->
            <div class="progress-bar-bg" *ngIf="cat.taskCount > 0">
              <div class="progress-bar-fill" [style.width.%]="(cat.completedCount / cat.taskCount) * 100"
                [style.background]="cat.color">
              </div>
            </div>
          </ion-label>

          <div slot="end" class="edit-btn">
            <ion-icon name="pencil"></ion-icon>
          </div>
        </ion-item>
      </ion-item-sliding>
    </div>
  </ng-container>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="openNew()" class="main-fab">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>

<!-- Add/Edit Category Modal -->
<ion-modal [isOpen]="isModalOpen" (didDismiss)="onModalDismiss()" [breakpoints]="[0, 0.85]" [initialBreakpoint]="0.85"
  class="category-modal">

  <ion-header class="ion-no-border">
    <ion-toolbar>
      <ion-title>{{ editingCategory ? 'Edit Category' : 'New Category' }}</ion-title>
      <ion-buttons slot="end">
        <ion-button (click)="closeModal()" fill="clear">
          <ion-icon name="close" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">

    <div class="form-group">
      <label class="form-label">Name *</label>
      <ion-input [(ngModel)]="catName" placeholder="Category name" class="custom-input"></ion-input>
    </div>

    <div class="form-group">
      <label class="form-label">Color</label>
      <div class="color-picker">
        <div *ngFor="let c of colors" class="color-swatch" [class.selected]="catColor === c" [style.background]="c"
          (click)="catColor = c">
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Icon</label>
      <div class="icon-picker">
        <div *ngFor="let i of icons" class="icon-option" [class.selected]="catIcon === i"
          [style.color]="catIcon === i ? catColor : ''" (click)="catIcon = i">
          <ion-icon [name]="i"></ion-icon>
        </div>
      </div>
    </div>

    <ion-button expand="block" (click)="saveCategory()" [disabled]="!catName.trim()" class="save-btn"
      style="margin-top: 1.5rem;">
      {{ editingCategory ? 'Save Changes' : 'Create Category' }}
    </ion-button>

  </ion-content>
</ion-modal>
